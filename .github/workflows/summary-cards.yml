name: Generate Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: mohamedboukari
          BRANCH_NAME: summary-cards
          IS_INCLUDE_FORKED_REPO: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push summary cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b summary-cards
          git add -A profile-summary-card-output/
          git commit -m "Generate summary cards" || echo "No changes"
          git push origin summary-cards --force
