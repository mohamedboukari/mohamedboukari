name: Generate Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: mohamedboukari
          BRANCH_NAME: summary-cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
